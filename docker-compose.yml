version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite:///./skin_analysis.db
      - MODEL_DEVICE=cpu
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./app/ml/weights:/app/app/ml/weights
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

